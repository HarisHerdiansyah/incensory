version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm install -g pnpm
        - pnpm install
        - pnpm dlx prisma generate
    build:
      commands:
        - echo "DATABASE_URL=$DATABASE_URL" >> .env.production
        - echo "NEXTAUTH_SECRET=$NEXTAUTH_SECRET" >> .env.production
        - echo "NEXTAUTH_URL=$NEXTAUTH_URL" >> .env.production
        - echo "BASE_URL=$BASE_URL" >> .env.production
        - echo "CLOUDFLARE_ACCOUNT_ID=$CLOUDFLARE_ACCOUNT_ID" >> .env.production
        - echo "S3_TOKEN=$S3_TOKEN" >> .env.production
        - echo "S3_ACCESS_KEY=$S3_ACCESS_KEY" >> .env.production
        - echo "S3_SECRET_KEY=$S3_SECRET_KEY" >> .env.production
        - echo "S3_ENDPOINT=$S3_ENDPOINT" >> .env.production
        - echo "S3_BUCKET=$S3_BUCKET" >> .env.production
        - echo "S3_PUBLIC_URL=$S3_PUBLIC_URL" >> .env.production
        - echo "S3_REGION=$S3_REGION" >> .env.production
        - echo "NEXT_PUBLIC_S3_PUBLIC_URL=$NEXT_PUBLIC_S3_PUBLIC_URL" >> .env.production
        - echo "SMTP_HOST=$SMTP_HOST" >> .env.production
        - echo "SMTP_USER=$SMTP_USER" >> .env.production
        - echo "SMTP_KEY=$SMTP_KEY" >> .env.production
        - echo "SMTP_SENDER=$SMTP_SENDER" >> .env.production
        - echo "JWT_SECRET=$JWT_SECRET" >> .env.production
        - echo "NEXT_PUBLIC_VR_URL=$NEXT_PUBLIC_VR_URL" >> .env.production
        - echo "VR_SECRET_KEY=$VR_SECRET_KEY" >> .env.production
        - pnpm run build
  artifacts:
    baseDirectory: .next
    files:
      - "**/*"
  cache:
    paths:
      - .next/cache/**/*
      - node_modules/**/*
